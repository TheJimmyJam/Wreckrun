<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<title>Wreck Run</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: #111;
    overflow: hidden;
    overscroll-behavior: none;
    touch-action: none;
    -webkit-user-select: none;
    user-select: none;
  }
  #stage {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #000;
  }
  #game-canvas {
    background: #3a7d3a;
    touch-action: none;
    display: block;
  }
  #rotate-overlay {
    position: fixed;
    inset: 0;
    background: #111;
    color: #fff;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: system-ui, sans-serif;
    font-size: 22px;
    text-align: center;
    z-index: 1000;
    gap: 12px;
  }
  #rotate-overlay .icon {
    font-size: 56px;
    animation: spin-hint 1.6s ease-in-out infinite;
  }
  @keyframes spin-hint {
    0%, 100% { transform: rotate(0deg); }
    50% { transform: rotate(90deg); }
  }
  @media (orientation: portrait) and (max-width: 900px) {
    #rotate-overlay { display: flex; }
  }
</style>
</head>
<body>
  <div id="stage">
    <canvas id="game-canvas"></canvas>
  </div>
  <div id="rotate-overlay">
    <div class="icon">🔁</div>
    <div>Rotate your device to play</div>
    <div style="font-size:14px;opacity:0.7;">Wreck Run is landscape only</div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
  <script type="module" src="./src/main.js"></script>
</body>
</html>
